version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediflow
      POSTGRES_PASSWORD: mediflow
      POSTGRES_DB: mediflow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://mediflow:mediflow@postgres:5432/mediflow
      JWT_SECRET: migrator-placeholder-not-used-for-auth-xx
      ADMIN_API_KEY: migrator-placeholder-not-used-for-auth-xx
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "9100:9100"
    environment:
      DATABASE_URL: postgresql+asyncpg://mediflow:mediflow@postgres:5432/mediflow
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-prod-please
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ADMIN_API_KEY: changeme-replace-in-prod-xxxxxxxxxx
      BOOKING_RATE_LIMIT: "10000/second"
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  mailhog:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI (mailpit UI)
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worker.main
    environment:
      DATABASE_URL: postgresql+asyncpg://mediflow:mediflow@postgres:5432/mediflow
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-prod-please
      ADMIN_API_KEY: changeme-replace-in-prod-xxxxxxxxxx
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@mediflow.dev
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      mailhog:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pg_data:
  grafana_data:
